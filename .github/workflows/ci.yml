name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      # Install only core + dev into an isolated venv (no --system: avoids PEP 668
      # externally-managed interpreters; pip-style install avoids resolving the
      # mutually-incompatible backend extras). Then run with --no-sync so uv does
      # not re-resolve the whole project.
      - name: Install (core + dev, mock backend only — GPU-free)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
      - name: Lint
        run: uv run --no-sync ruff check src tests scripts
      - name: Test (L1 core math + L2 mock pipeline, GPU-free)
        run: uv run --no-sync pytest -q --cov=mlipgauge --cov-report=term-missing

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: uv build
      - name: Check wheel imports cleanly
        run: |
          uv venv --python 3.12
          uv pip install dist/*.whl
          uv run --no-sync python -c "import mlipgauge; print(mlipgauge.__version__)"
