name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      # uv manages an isolated venv (no --system: avoids PEP 668 externally-managed
      # interpreters on ubuntu/macos). The first `uv run` creates + syncs it.
      - name: Lint
        run: uv run --extra dev ruff check src tests scripts
      - name: Test (L1 core math + L2 mock pipeline, GPU-free)
        run: uv run --extra dev pytest -q --cov=mlipgauge --cov-report=term-missing

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: uv build
      - name: Check wheel imports cleanly
        run: |
          uv venv
          uv pip install dist/*.whl
          uv run --no-sync python -c "import mlipgauge; print(mlipgauge.__version__)"
