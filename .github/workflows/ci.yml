name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # uv.lock is not committed (library); key the cache on the dependency
          # source so it actually invalidates instead of warning on a missing lock
          cache-dependency-glob: "pyproject.toml"
          python-version: ${{ matrix.python-version }}
      # setup-uv (with python-version) already created and activated .venv.
      # Install only core + dev into it via pip-style install (no --system, and
      # no whole-project resolution that would hit the conflicting backend
      # extras). Then run with --no-sync so uv does not re-resolve.
      - name: Install (core + dev, mock backend only — GPU-free)
        run: uv pip install -e ".[dev]"
      - name: Lint
        run: uv run --no-sync ruff check src tests scripts
      - name: Test (L1 core math + L2 mock pipeline, GPU-free)
        run: uv run --no-sync pytest -q --cov=mlipgauge --cov-report=term-missing

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: uv build
      - name: Check wheel imports cleanly
        run: |
          uv pip install dist/*.whl
          uv run --no-sync python -c "import mlipgauge; print(mlipgauge.__version__)"
